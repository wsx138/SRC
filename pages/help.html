<div class="help-page">
    <h2>帮助中心</h2>
    <p>欢迎来到用户管理系统的帮助中心！</p>
    
    <div class="help-section">
        <h3>如何注册账号？</h3>
        <p>点击导航栏的"注册"链接，填写用户名、密码、邮箱和手机号即可注册新账号。</p>
    </div>
    
    <div class="help-section">
        <h3>如何登录？</h3>
        <p>点击导航栏的"登录"链接，输入您的用户名和密码即可登录系统。</p>
    </div>
    
    <div class="help-section">
        <h3>如何查看个人中心？</h3>
        <p>登录后点击导航栏的"个人中心"，即可查看您的个人信息和余额。</p>
    </div>
    
    <div class="help-section">
        <h3>如何充值？</h3>
        <p>在个人中心页面，输入充值金额后点击"充值"按钮即可完成充值。</p>
    </div>
    
    <div class="help-section">
        <h3>如何上传头像？</h3>
        <p>登录后点击导航栏的"上传头像"，选择图片文件上传即可。</p>
    </div>
    
    <div class="help-section">
        <h3>如何搜索用户？</h3>
        <p>登录后在首页搜索框中输入关键词，点击搜索即可查找用户。</p>
    </div>
</div>
