{% extends "base.html" %}
{% block content %}
{% if user %}
    <div class="card">
        <h2>欢迎回来，{{ user.username }}！</h2>
        <div class="user-info">
            <div class="info-row"><span class="info-label">用户名</span><span class="info-value">{{ user.username }}</span></div>
            <div class="info-row"><span class="info-label">邮箱</span><span class="info-value">{{ user.email }}</span></div>
            <div class="info-row"><span class="info-label">手机</span><span class="info-value">{{ user.phone }}</span></div>
            <div class="info-row"><span class="info-label">角色</span><span class="info-value">{{ user.role }}</span></div>
            <div class="info-row"><span class="info-label">余额</span><span class="info-value">{{ user.balance }}</span></div>
        </div>
        <a href="/logout" class="btn btn-danger">退出登录</a>
    </div>
{% else %}
    <div class="card">
        <h2>请先登录</h2>
        <p>您尚未登录，请先登录以查看用户信息。</p>
        <a href="/login" class="btn btn-primary">前往登录</a>
    </div>
{% endif %}
{% endblock %}
